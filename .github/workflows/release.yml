name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build Aware
        run: |
          xcodebuild -scheme Aware -configuration Release -derivedDataPath build \
            build -quiet

      - name: Create zip
        run: |
          cd build/Build/Products/Release
          zip -r Aware.zip Aware.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Build/Products/Release/Aware.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
