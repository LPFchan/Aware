name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  DMGMAKER_VERSION: v1.0.3

jobs:
  build:
    runs-on: macos-14
    outputs:
      sparkle_enabled: ${{ steps.sparkle_settings.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16 (Swift 6 for DMGMaker)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Determine Sparkle publishing settings
        id: sparkle_settings
        env:
          ENABLE_SPARKLE_RELEASES: ${{ vars.ENABLE_SPARKLE_RELEASES }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          pages_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${repo_name}"
          echo "pages_url=${pages_url}" >> "$GITHUB_OUTPUT"

          if [[ "$ENABLE_SPARKLE_RELEASES" == "true" && -n "$SPARKLE_PRIVATE_ED_KEY" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release directories
        run: |
          mkdir -p build/release

      - name: Build release
        run: |
          xcodebuild -scheme Aware -configuration Release -derivedDataPath build \
            build -quiet

      - name: Create DMG with DMGMaker
        run: |
          git clone --depth 1 --branch "$DMGMAKER_VERSION" \
            https://github.com/saihgupr/DMGMaker.git build/DMGMaker
          APP_PATH="${GITHUB_WORKSPACE}/build/Build/Products/Release/Aware.app"
          cd "${GITHUB_WORKSPACE}/build/DMGMaker"
          swift run -c release "DMG Maker" --app "$APP_PATH" --name "Aware"
          DMG_SRC="${GITHUB_WORKSPACE}/build/Build/Products/Release/Aware.dmg"
          if [[ ! -f "$DMG_SRC" ]]; then
            echo "Expected DMG not found at $DMG_SRC" >&2
            ls -la "${GITHUB_WORKSPACE}/build/Build/Products/Release/" >&2
            exit 1
          fi
          cp "$DMG_SRC" "${GITHUB_WORKSPACE}/build/release/Aware.dmg"

      - name: Create Release
        run: |
          release_tag="${GITHUB_REF#refs/tags/}"
          release_notes_path="release-notes/${release_tag}.md"

          release_args=(
            "$release_tag"
            build/release/Aware.dmg
            --title "Aware ${{ github.ref_name }}"
          )

          if [[ -f "$release_notes_path" ]]; then
            release_args+=(--notes-file "$release_notes_path")
          else
            release_args+=(--generate-notes)
          fi

          gh release create "${release_args[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate appcast site
        if: steps.sparkle_settings.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
          DOWNLOAD_URL_PREFIX: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/
          EXISTING_APPCAST_URL: ${{ steps.sparkle_settings.outputs.pages_url }}/appcast.xml
          FULL_RELEASE_NOTES_URL: https://github.com/${{ github.repository }}/releases
          PROJECT_URL: https://github.com/${{ github.repository }}
        run: |
          release_tag="${GITHUB_REF#refs/tags/}"
          pages_base="${{ steps.sparkle_settings.outputs.pages_url }}"
          mkdir -p build/release-metadata build/appcast-site/release-notes
          gh release view "$release_tag" --json body --jq .body > build/release-metadata/Aware.md
          chmod +x scripts/generate-sparkle-appcast.sh
          touch build/appcast-site/.nojekyll

          notes_en="release-notes/${release_tag}.md"
          if [[ -f "$notes_en" ]]; then
            src_en="$notes_en"
          else
            src_en="build/release-metadata/Aware.md"
          fi
          python3 scripts/md_to_release_notes_html.py "$src_en" "build/appcast-site/release-notes/${release_tag}.en.html" en

          extra_langs=()
          for lang in ko ja zh-Hans; do
            notes_path="release-notes/${release_tag}.${lang}.md"
            if [[ -f "$notes_path" ]]; then
              python3 scripts/md_to_release_notes_html.py "$notes_path" "build/appcast-site/release-notes/${release_tag}.${lang}.html" "$lang"
              extra_langs+=("$lang")
            fi
          done

          export APPCAST_REPLACE_SHORT_VERSION="${GITHUB_REF_NAME#v}"
          export SPARKLE_EMBED_RELEASE_NOTES=0
          scripts/generate-sparkle-appcast.sh \
            build/release/Aware.dmg \
            build/appcast-site

          python3 scripts/patch-appcast-localized-release-notes.py \
            build/appcast-site/appcast.xml \
            "$pages_base" \
            "$release_tag" \
            "${GITHUB_REF_NAME#v}" \
            "${extra_langs[@]}"

      - name: Upload appcast artifact
        if: steps.sparkle_settings.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/appcast-site

  deploy-appcast:
    if: needs.build.outputs.sparkle_enabled == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy appcast to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
