name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build Aware
        run: |
          xcodebuild -scheme Aware -configuration Release -derivedDataPath build \
            build -quiet

      - name: Create zip
        run: |
          cd build/Build/Products/Release
          zip -r Aware.zip Aware.app

      - name: Create Release
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            build/Build/Products/Release/Aware.zip \
            --title "Aware ${{ github.ref_name }}" \
            --notes "Download Aware.zip, unzip, and drag Aware.app to Applications."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
