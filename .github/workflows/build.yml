name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build Aware
        run: |
          xcodebuild -scheme Aware -configuration Debug -derivedDataPath build \
            build -quiet
